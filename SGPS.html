<!DOCTYPE html>
<html>
<head>
    <title>Registro GPS</title>
</head>
<body>

<h2>Registro de Ubicación</h2>

<input type="text" id="dni" placeholder="Ingrese su DNI" maxlength="8">
<br><br>

<input type="text" id="telefono" placeholder="Ingrese su teléfono" maxlength="9">
<br><br>

<button onclick="enviarUbicacion()">
    Registrar Ubicación
</button>

<p id="estado"></p>

<script>
async function enviarUbicacion() {

    const dni = document.getElementById("dni").value.trim();
    const telefono = document.getElementById("telefono").value.trim();

    if (dni.length !== 8) {
        alert("Ingrese un DNI válido");
        return;
    }

    if (telefono.length !== 9) {
        alert("Ingrese un teléfono válido");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async function(posicion) {

            const datos = {
                dni: dni,
                telefono: telefono,
                latitud: posicion.coords.latitude,
                longitud: posicion.coords.longitude,
                precision: posicion.coords.accuracy,
                fecha: new Date().toISOString()
            };

            await fetch(
                "https://script.google.com/macros/s/TU_URL/exec",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(datos)
                }
            );

            document.getElementById("estado").innerText =
                "Ubicación registrada correctamente";
        },
        function(error) {
            document.getElementById("estado").innerText =
                "No se pudo obtener la ubicación";
        }
    );
}
</script>

</body>
</html>
